name: Bug report
description: Report a reproducible Clovis bug without sharing private financial data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not attach real ledgers, bank statements, account numbers, balances, or personally identifying financial records. Redact examples or create a synthetic reproduction.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Clovis version
      description: Run `clovis --version` or check `npm ls clovis`.
      placeholder: "0.3.3"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - MCP server
        - Node API
        - Statement import
        - Reports
        - Ledger storage
        - Release/package
        - Documentation
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal command, tool call, or code sample using synthetic data.
      render: shell
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Does this affect parsing, ledger mutation, filesystem access, reports, integrity, or release provenance?
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed or replaced real financial data before posting.
          required: true
