name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26.3.0"
          registry-url: "https://registry.npmjs.org/"
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run release:check
      - run: npm publish --provenance
