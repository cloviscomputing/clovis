name: Publish

# Publishing is deliberately release-driven, not push-driven. GitHub Releases
# are the human approval point; npm Trusted Publishing supplies provenance.
on:
  release:
    types:
      - published

# Only one npm publish may run at a time. npm versions are immutable, so racing
# release jobs would create confusing partial failures.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    env:
      # Stable releases become latest; prereleases stay on next until promoted.
      NPM_TAG: ${{ github.event.release.prerelease && 'next' || 'latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26.3.0"
          registry-url: "https://registry.npmjs.org/"
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run release:check
      - run: npm publish --provenance --tag "$NPM_TAG"
